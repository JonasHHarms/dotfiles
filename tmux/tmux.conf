# General
set -g default-terminal "screen-256color"
set -g mouse on
set -g extended-keys off
set -g extended-keys-format xterm #csi-u                    # other option: csi-u
set -g history-limit 500000
set -g focus-events on                              # focus events are requested from the terminal if supported and passed through to applications running in tmux
set -g base-index 1                                 # start windows numbering at 1
set -g set-titles off                               # hyprland has no ditle display on set-titles-string needs to be added if i wnat this
set -g set-clipboard external #on
set -g copy-command "wl-copy --primary --trim-newline"
set -g history-file '$HOME/.cache/zsh_history'
set -g variation-selector-always-wide on            # Always treat Unicode variation selector 16 as marking a wide character.  This is a feature of some terminals as part of their Unicode 14 support. emojis are always wide
set -g assume-paste-time 0                          # if keys are typed faster than x per ms asume they are beeing pasted 

# Window
set -g window-style noattr                          # styling applies to all panes
set -g window-active-style noattr                   # Style of the currently active pane
set -g window-status-activity-style 'fg=red'        # style of window with a running activity
set -g window-status-bell-style ''                  # style of window with a bell
set -g window-status-current-format ""              # name of active window
set -g window-status-current-style 'fg=red'         # test of the mid part of the status line
set -g window-status-format 'ciao'                  # window list format
set -g window-status-separator '|'                  # character that seperates windows in list 
set -g window-status-style 'fg=blue'                # format of window name list other than current
set -g window-status-last-style ''                  # format of last active window
set -g renumber-windows on
set -g automatic-rename on                          # rename window to reflect current program
set -g fill-character X                             # fill unused space with this 

# Panes
set -g pane-base-index 1                            # make pane numbering consistent with windows
set -g display-panes-active-colour green            # color of the pane numbering
set -g display-panes-colour green                   # color of pane numbering for inactive panes
set -g display-panes-time 1000                      # how long in ms the pane numbering will be shown
set -g pane-border-style 'fg=grey'
set -g pane-active-border-style 'fg=green'
set -g pane-border-status top                       # names for panes
set -g pane-border-indicators off
set -g pane-border-format '#[bold] #{pane_title} #[default]'
set -g pane-border-lines heavy
set -g pane-scrollbars modal
set -g pane-scrollbars-style 'fg=green'
set -g pane-scrollbars-position right

# Context menu
set -g popup-border-lines rounded
set -g popup-style ''
set -g popup-border-style ''
set -g menu-style noattr                            # context menu style
set -g menu-border-style noattr                     # context menu style
set -g menu-border-lines rounded                    # context menu
set -g menu-selected-style 'fg=black,bg=green'      # context menu style

# Status
set -g status-keys vi                               # status line acts like Vi line instead of emacs
set -g status on                                    # on or num of rows 2-5 for status line
set -g status-interval 10                           # redraw status line every 10 seconds
set -g status-right-length 30
set -g status-left-length 30
set -g status-left-style  ''
set -g status-left-style ''
set -g status-position top 
set -g status-justify centre                        # in row 2 of status line where to show window list
set -g status-style 'fg=white,fill=red' #us=green underscore
set -g status-left "#{prefix_highlight} 󰁹 #(upower -b | grep percentage | awk '/percentage:/ {print$2}') #(~/.config/tmux/netstat.sh) #(~/.config/tmux/btstat.sh) #(~/.config/tmux/updates.sh) #(~/.config/tmux/volstat.sh)"
set -g status-right "#(date +'%H:%M %a, %d-%b-%y ') #(curl -s "http://wttr.in/FRA?format=1")"

# Notifications 
set -g monitor-activity on                          # check if app wants to notify
set -g monitor-bell on                              # check if app wants to notify
set -g monitor-activity on                          # check if app wants to notify
set -g monitor-silence 0                            # panes inactive for more than x seconds throw notify
set -g activity-action other                        # which runnign panes are checked for notify Will give a bright ACTIVITY IN WINDOW WARING in status line, might annoy
set -g visual-activity both                         # on makes send message instead of bell
set -g visual-bell both                             # message is shown on a bell in a window for which the monitor-bell window option is enabled instead of it being passed through to the terminal
set -g bell-action other 
set -g display-time 500                             # how many ms to notify
set -g message-command-style noattr                 # Set status line message command style.  This is used for the command prompt with vi(1) keys when in command mode.
set -g message-line 0                               # which lines are messages shown on 0-4
set -g message-style 'fg=black,bg=red'

# cursor
set -g cursor-style block
#set -g prompt-cursor-colour noattr                 # cursor in tmux command mode
#set -g prompt-cursor-style noattr                  # cursor in tmux command mode

# behaviour
set -g exit-empty off                               # exit when there are no active sessions.
set -g exit-unattached off                          # exit when there are no attached sessions.
set -g remain-on-exit off #failed                        # A pane with this flag set is not destroyed when the program running in it exits.  If set to failed, then only when the program exit status is not zero.  The pane may be reactivated with the respawn-pane command.
set -g remain-on-exit-format "exiting on success"
set -g scroll-on-clear on                           # put things into history b4 clearing
set -g synchronize-panes off                        # Input gets send to all panes
set -g allow-passthrough on                        # apps can escape tmux on,off,all on is just active window
set -g alternate-screen on                          # restore terminal output before app stared when app exits
set -g allow-set-title on                           # apps can escape tmux to set window title
set -g editor nvim
set -g destroy-unattached off                        # destroy the session after the last client has detached.
set -g detach-on-destroy on                         # clients connected to destroyed sessions are moved to the next session
set -g aggressive-resize off                        # resize the window to the size of the smallest or largest session


# navigation
set -g escape-time 10                               # more time to hit bind-keys after leader
set -g prefix-timeout 1000                          # more time to hit bind-keys after leader
set -g repeat-time 5000                             # increase repeat timeout
set -g initial-repeat-time 1000                     # time to rpeat keys without having to ctrl B again
set -g repeat-time 1000                             # time to rpeat keys without having to ctrl B again
set -g prefix C-b
set -g prefix2 None
bind-key h select-pane -L                           # move left
bind-key j select-pane -D                           # move down
bind-key k select-pane -U                           # move up
bind-key l select-pane -R                           # move right

# special modes
set -g mode-style 'fg=#000000,bg=green'             # little popup of scroll mode etc
set -g clock-mode-style 24                          # for clock mode 
set -g clock-mode-colour green
set -g mode-keys vi
set -g copy-mode-match-style ''
set -g copy-mode-mark-style ''
set -g copy-mode-current-match-style ''
set -g copy-mode-position-format ''
set -g copy-mode-position-style ''
set -g copy-mode-selection-style 'fg=#000000,bg=orange'

# Layout 
set -g  main-pane-height 5%                         # min w for main pane 
set -g main-pane-width 5%                           # min w for main pane 
set -g  other-pane-height 5%                        # max h for side pane 
set -g other-pane-width 5%                          # max w for side pane


