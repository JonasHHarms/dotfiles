general {
    lock_cmd = loginctl lock-session  #pidof hyprlock || hyprctl dispatch exec hyprlock       # avoid starting multiple hyprlock instances.
    unlock_cmd = loginctl unlock-session
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = sh -c "~/.config/hypr/screensavers.sh"
    on-resume = hyprctl dispatch closewindow class:screensaver
}
