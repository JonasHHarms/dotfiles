
# Named rules take precedence over anonymous ones. That is, rules are evaluated top to bottom, but all named rules get evaluated first, then all anonymous ones

windowrule {
    name = feetintheair

    match:initial_class = foot
    size = 250 500
    float = on
    move = (cursor_x-(window_w*-0.5)) (cursor_y-(window_h)) # Open at the mouse pos 
    animation = popin
    #stay_focused = on
    #dim_around = on
    #focus_on_activate = on
}

windowrule {
    name = peaclock

    match:initial_class = foot
    match:title = peaclock
    size = 250 250
    float = on
    #move = (cursor_x-(window_w*-0.5)) (cursor_y-(window_h)) # Open at the mouse pos 
    animation = popin
    #stay_focused = on
    #dim_around = on
    #focus_on_activate = on
}
