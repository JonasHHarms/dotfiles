### Masterrule, list last ###
windowrule {
    #name = # masterule, unnamed so its last

    ### Match ####
    #match:class =                     # Windows with class matching =.
    #match:title =                     # Windows with title matching =.
    #match:initial_class =             # Windows with initialClass matching =.
    #match:initial_title =             # Windows with initialTitle matching =.
    #match:tag =                       # Windows with matching tag.
    #match:xwayland =                  # Xwayland windows.
    #match:float =                     # Floating windows.
    #match:fullscreen =                # Fullscreen windows.
    #match:pin =                       # Pinned windows.
    #match:focus =                     # Currently focused window.
    #match:group =                     # Grouped windows.
    #match:modal =                     # Modal windows (e.g. “Are you sure” popups)
    #match:fullscreen_state_client =   # Windows with matching fullscreenstate. client can be 0 - none, 1 - maximize, 2 - fullscreen, 3 - maximize and fullscreen.
    #match:fullscreen_state_internal = # Windows with matching fullscreenstate. internal can be 0 - none, 1 - maximize, 2 - fullscreen, 3 - maximize and fullscreen.
    #match:workspace =                 # Windows on matching workspace. w can be id, name:string or workspace selector.
    #match:content =                   # Windows with specified content type (none = 0, photo = 1, video = 2, game = 3)
    #match:xdg_tag =                   # Match a window by its xdgTag (see hyprctl clients to check if it has one)

    ### Static rules ###
    #float =             # Floats a window.
    #tile =              # Tiles a window.
    #fullscreen =        # Fullscreens a window.
    #maximize =          # Maximizes a window.
    #fullscreen_state =  # Sets the focused window’s fullscreen mode and the one sent to the client, where internal and client can be 0 - none, 1 - maximize, 2 - fullscreen, 3 - maximize and fullscreen.
    #move =              # Moves a floating window to a given coordinate, monitor-local. Two expressions are space-separated.
    #size =              # Resizes a floating window to a given size. Two expressions are space-separated.
    #center =            # If the window is floating, will center it on the monitor.
    #pseudo =            # Pseudotiles a window.
    #monitor =           # Sets the monitor on which a window should open. id can be either the id number or the name (e.g. 1 or DP-1).
    #workspace =         # Sets the workspace on which a window should open (for workspace syntax, see dispatchers->workspaces). You can also set [w= # to unset. This will unset all previous workspace rules applied to this window. Additionally you can add silent after the workspace to make the window open silently.
    #no_initial_focus =  # Disables the initial focus to the window
    #pin =               # Pins the window (i.e. show it on all workspaces). Note: floating only.
    #suppress_event =    # Ignores specific events from the window. Events are space separated, and can be: fullscreen, maximize, activate, activatefocus, fullscreenoutput.
    #content =           # [none|photo|video|game Sets content type.
    #no_close_for =      # Makes the window uncloseable with the killactive dispatcher for a given amount of ms on open.:

    ### Dynamic rules ###
    #persistent_size =        # For floating windows, internally store their size. When a new floating window opens with the same class and title, restore the saved size.
    #no_max_size =            # Removes max size limitations. Especially useful with windows that report invalid max sizes (e.g. winecfg).
    #stay_focused =           # Forces focus on the window as long as it’s visible.
    #animation =              # Forces an animation onto a window, with a selected opt. Opt is optional.
    #border_color =           # Force the border color of the window. Options for c: color/color ... color angle -> sets the active border color/gradient OR color color/color ... color angle color ... color [angle] -> sets the active and inactive border color/gradient of the window. See variables->colors for color definition.
    #idle_inhibit =           # Sets an idle inhibit rule for the window. If active, apps like hypridle will not fire. Modes: none, always, focus, fullscreen.
    #opacity =                # Additional opacity multiplier. Options for a: float -> sets an overall opacity, float float -> sets active_opacity and inactive_opacity respectively, float float float -> sets active_opacity, inactive_opacity and fullscreen_opacity respectively.
    #tag =                    # Applies the tag name to the window, use prefix +/- to set/unset flag, or no prefix to toggle the flag.
    #max_size =               # Sets the maximum size (x,y -> int). Applies to floating windows. (use misc:size_limits_tiled to include tiled windows.)
    #min_size =               # Sets the minimum size (x,y -> int). Applies to floating windows. (use misc:size_limits_tiled to include tiled windows.)
    #border_size =            # Sets the border size.
    #rounding =               # Forces the application to have X pixels of rounding, ignoring the set default (in decoration:rounding). Has to be an int.
    #rounding_power =         # Overrides the rounding power for the window (see decoration:rounding_power).
    #allows_input =           # Forces an XWayland window to receive input, even if it requests not to do so. (Might fix issues like Game Launchers not receiving focus for some reason)
    #dim_around =             # Dims everything around the window. Please note that this rule is meant for floating windows and using it on tiled ones may result in strange behavior.
    #decorate =               # (default is true) Whether to draw window decorations or not
    #focus_on_activate =      # Whether Hyprland should focus an app that requests to be focused (an activate request).
    #keep_aspect_ratio =      # Forces aspect ratio when resizing window with the mouse.
    #nearest_neighbor =       # Forces the window to use nearest neighbor filtering.
    #no_anim =                # Disables the animations for the window.
    #no_blur =                # Disables blur for the window.
    #no_dim =                 # Disables window dimming for the window.
    #no_focus =               # Disables focus to the window.
    #no_follow_mouse =        # Prevents the window from being focused when the mouse moves over it when input:follow_mouse=1 is set.
    #no_shadow =              # Disables shadows for the window.
    #no_shortcuts_inhibit =   # Disallows the app from inhibiting your shortcuts.
    #no_screen_share =        # Hides the window and its popups from screen sharing by drawing black rectangles in their place. The rectangles are drawn even if other windows are above.
    #no_vrr =                 # Disables VRR for the window. Only works when misc:vrr is set to 2 or 3.
    #opaque =                 # Forces the window to be opaque.
    #force_rgbx =             # Forces Hyprland to ignore the alpha channel on the whole window’s surfaces, effectively making it actually, fully 100% opaque.
    #sync_fullscreen =        # Whether the fullscreen mode should always be the same as the one sent to the window (will only take effect on the next fullscreen mode change).
    #immediate =              # Forces the window to allow tearing. See the Tearing page.
    #xray =                   # Sets blur xray mode for the window.
    #render_unfocused =       # Forces the window to think it’s being rendered when it’s not visible. See also Variables - Misc for setting render_unfocused_fps.
    #scroll_mouse =           # Forces the window to override the variable input:scroll_factor.
    #scroll_touchpad =        # Forces the window to override the variable input:touchpad:scroll_factor.

    ### Group rules ###
    #group =             # Sets window group properties. See the note below.
    #set =       # [always] Open window as a group.
    #new =       # Shorthand for barred set.
    #lock =      # [always] - Lock the group that added this window. Use with set or new (e.g. new lock) to create a new locked group.
    #barred =    # Do not automatically group the window into the focused unlocked group.
    #deny =      # Do not allow the window to be toggled as or added to group (see denywindowfromgroup dispatcher).
    #invade =    # Force open window in the locked group.
    #override =  # [other options] - Override other group rules, e.g. You can make all windows in a particular workspace open as a group, and use group override barred to make windows with specific titles open as normal windows.
    #unset =     # Clear all group rules.
}
layerrule {
# Allows eg to blur only the screenbar
    #name =              # unnamed so its last
    #match:namespace =   # selection namespace of the layer, check hyprctl layers
    #no_anim = on        # disable animation
    #blur =              # [on] Enables blur for the layer.
    #blur_popups =       # [on] Enables blur for the popups.
    #ignore_alpha =      # [a] Makes blur ignore pixels with opacity of a or lower. a is float value from 0 to 1. a = 0 if unspecified.
    #dim_around =        # [on] Dims everything behind the layer.
    #xray =              # [on] Sets the blur xray mode for a layer. 0 for off, 1 for on, unset for default.
    #animation =         # [style] Allows you to set a specific animation style for this layer.
    #order =             # [n] Sets the order relative to other layers. A higher n means closer to the edge of the monitor. Can be negative. n = 0 if unspecified.
    #above_lock =        # [0/1/2] If non-zero, renders the layer above the lockscreen when the session is locked. If set to 2, you can interact with the layer on the lockscreen, otherwise it will only be rendered above it.
    #no_screen_share =   #  [on]Hides the layer from screen sharing by drawing a black rectangle over it.

}

