# Hyprland keybinds
binds {
    pass_mouse_when_bound = 0 # mouse moves with keybind (alt+mouseleft as a bind)
    scroll_event_delay = 100
    workspace_back_and_forth = 0 # switch to the currently focused workspace will instead switch to the previous workspace.
    hide_special_on_workspace_change = 0 
    allow_workspace_cycles = 1 # allow endless previouzs workspace cycke
    workspace_center_on = 1 # 1 measn go to last active window on ws instead of center
    focus_preferred_method = 0 # focus chanign based on edge instead of history (0)
    movefocus_cycles_fullscreen = 1
    movefocus_cycles_groupfirst = 0
    disable_keybind_grabbing = 0
    window_direction_monitor_fallback = 1 # move windowsn between monitors
}

#normal 
bind = ALT, F4, exec, hyprctl dispatch killactive
bind = SUPER SHIFT, esc, exec, loginctl terminate-user ""
bind = SUPER, R, exec, ghostty
bind = SUPER, F, togglefloating
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, Y, togglesplit, # dwindle
bind = SUPER SHIFT, L, exec, pidof hyprlock || hyprlock
bind = SUPER, V, exec, cliphist list | wofi --dmenu --conf="$HOME/.config/wofi/config" | cliphist decode | wl-copy && wl-paste #&
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
bind = SUPER, left,  workspace, e-1
bind = SUPER, right, workspace, e+1
bind = SUPER, up, resizeactive, 100 -100
bind = SUPER, down, resizeactive, -100 100
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# bindm
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

#bindel
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# bindl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
#bindl =,switch:Lid Switch,exec, hyprlock || hyprlock & systemctl suspend
