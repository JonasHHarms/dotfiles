# Hyprland keybinds
binds {
    pass_mouse_when_bound = 0 # mouse moves with keybind (alt+mouseleft as a bind)
    scroll_event_delay = 10 # mouse wheele scroll at lease x
    workspace_back_and_forth = 0 # switch to the currently focused workspace will instead switch to the previous workspace.
    hide_special_on_workspace_change = 0 
    allow_workspace_cycles = 1 # allow endless previouzs workspace cycke
    workspace_center_on = 1 # 1 measn go to last active window on ws instead of center
    focus_preferred_method = 0 # focus chanign based on edge instead of history (0)
    movefocus_cycles_fullscreen = 1
    movefocus_cycles_groupfirst = 0
    disable_keybind_grabbing = 1
    window_direction_monitor_fallback = 1 # move windowsn between monitors
    drag_threshold = 10 # drage mouse at least this far for mousedrag binds
}

#normal 
bind = ALT_L, F4, exec, hyprctl dispatch killactive
bind = SUPER CONTROL_L, Escape, exec, loginctl terminate-user $USER
bind = SUPER, ENTER, exec, ghostty +new-window
bind = SUPER, R, exec, ghostty -e tmux attach-session -t mainctl
bind = SUPER, F, togglefloating
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, Y, layoutmsg, togglesplit # dwindle
bind = SUPER SHIFT, L, exec, pidof hyprlock || hyprlock
#bindr = CONTROL_L, C, exec, wl-paste | wl-copy --primary #doesnt work :(
#bindr = CONTROL_L, V, exec, cliphist list | cliphist decode | wtype - # works but also sends enter, and types out everything instead of paste
#bind = SUPER, V, exec, cliphist list | wofi --dmenu --conf="$HOME/.config/wofi/config" | cliphist decode | wtype -
bind = SUPER, V, exec, foot -e tmux attach-session -t clipboard
bind = SUPER SHIFT, V, exec, cat $HOME/.config/cliphist/favs | wofi --dmenu --conf="$HOME/.config/wofi/config" | wtype -
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
bind = SUPER, left,  workspace, e-1
bind = SUPER, right, workspace, e+1
bind = SUPER, up, resizeactive, 100 -100
bind = SUPER, down, resizeactive, -100 100
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Mouse
#mouse wheel events: mouse_up mouse_down mouse_left mouse_right 
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Lockscreen allowed 
bindel = ,XF86AudioRaiseVolume, exec, $HOME/.config/dunst/volumenotify.sh 2%+
bindel = ,XF86AudioLowerVolume, exec, $HOME/.config/dunst/volumenotify.sh 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && $HOME/.config/dunst/volumenotify.sh
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, $HOME/.config/dunst/volumenotify.sh 10%+
bindel = ,XF86MonBrightnessDown, exec, $HOME/.config/dunst/volumenotify.sh 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
#bindl =,switch:Lid Switch,exec, hyprlock || hyprlock & systemctl suspend
#bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, enable"
