# DAEMON 
       #--password-prompt=COMMAND # Password retrieval command. The string is formatted with the device attributes as keyword arguments, e.g.: -p "zenity --entry --hide-text --text 'Enter password for {device_presentation}:'"
       #--automount # Enable automounting new devices (default).
       #--no-automount # Disable automounting new devices.
       #--notify # Enable pop-up notifications (default).
       #--tray # Show tray icon.
       #--smart-tray # Show tray icon that automatically hides when there is no action available.
       #--no-tray # Disable tray icon (default).
       #--file-manager=yazi # Set program to open mounted directories. Default is 'xdg-open'. Pass an empty string to disable this feature.
       #--terminal=ghostty # Set terminal command line to open mounted directories. Default is none! Pass an empty string to disable this feature.
       #--password-cache 5 # Cache passwords for LUKS partitions and set the timeout in minutest
       #--event-hook COMMAND # Command to execute on device events. Command string be formatted using the event name and the list of device attributes (see below), e.g.: --event-hook "zenity --info --text '{event}: {device_presentation}'"
       #--no-event-hook # No notify command (default).
# MOUNT OPTIONS
       #--all # Mount all handled devices.
       #--recursive # Recursively mount cleartext partitions after unlocking a LUKS device. This will happen by default when running the udiskie daemon.
       #--no-recursive # Disable recursive mounting (default).
       #--options=OPTIONS # Set mount options.
# UNMOUNT OPTIONS
       #--all # Unmount all handled devices.
       #--detach # Detach drive by e.g. powering down its physical port.
       #--no-detach # Don’t detach drive (default).
       #--eject # Eject media from the drive, e.g CDROM.
       #--no-eject # Don’t eject media (default).
       #--force # Force removal (recursive unmounting).
       #--no-force # Don’t force removal (default).
       #--lock # Lock device after unmounting (default).
       #--no-lock # Don’t lock device.
# CONFIGURATION
 program_options:
   tray:             false     # [bool] Enable the tray icon. "auto" means auto-hide the tray icon when there are no handled devices.
   automount:        true      # [bool] Enable automatic mounting.
   notify:           true      # [bool] Enable notifications.
   password_cache:   30        # [int] Password cache in minutes. Caching is disabled by default. It can be disabled explicitly by setting it to false
   file_manager:     yazi      # [string] Set program to open directories. It will be invoked with the folder path as its last command line argument.
   terminal:         'ghostty' # [string] Set terminal command line to open directories. It will be invoked with the folder path as its last command line argument.
   #password_prompt: ["gnome-keyring-query", "get", "{id_uuid}"] # [string|list] Set command to retrieve passwords. If specified as a list it defines the ARGV array for the program call. If specified as a string, it will be expanded in a shell-like manner. Each string will be formatted using ‘str.format‘. For a list of device attributes, see below. The two special string values "builtin:gui" and "builtin:tty" signify to use udiskie's builtin password prompt.
   event_hook: "dunstify" # [string|list] Set command to be executed on any device event. This is specified like ‘password_prompt‘.

 notifications:
   # Customize which notifications are shown for how long. positive number = timeout in seconds; false  = disable; -1 use the libnotify default timeout
   timeout:          2      # set the default for all notifications
   device_mounted:   2      # mount notification
   device_unmounted: 2      # unmount notification
   device_added:     2      # device has appeared
   device_removed:   2      # device has disappeared
   device_unlocked:  2      # encrypted device was unlocked
   device_locked:    2      # encrypted device was locked
   job_failed:       2      # mount/unlock/.. has failed

 quickmenu_actions: [mount, unmount, unlock, terminal, detach, delete]

 notification_actions:
   device_mounted:   [browse]
   device_added:     [mount]

 icon_names:
   media:    [drive-removable-media, media-optical]
   browse:   [document-open, folder-open]
   terminal: [terminal, terminator, xfce-terminal]
   mount:    [udiskie-mount]
   unmount:  [udiskie-unmount]
   unlock:   [udiskie-unlock]
   lock:     [udiskie-lock]
   eject:    [udiskie-eject, media-eject]
   detach:   [udiskie-detach]
   delete:   [udiskie-eject]
   quit:     [application-exit]

 #device_config:
   # Any rule can contain multiple filters (AND) and multiple actions.
   #- device_file: /dev/dm-5    # [filter]
     #- id_uuid:                  # [filter] match by device UUID
       #- 9d53-13ba               # This rule matches on either of these uids
       #- 8675-309a
     #- id_type: vfat           # [filter] match file system type
     #options: [noexec, nodev]  # [action] mount options can be given as list
     #ignore:  false            # [action] never ignore this device
     #automount: false          # [action] do not automount this device
     #skip: true                # [action] skip all further (even builtin) rules ## for all matched devices, and resolve action result # on parent device
     #keyfile: /path/to/keyfile # [action] use keyfile to unlock a luks encrypted # device, bypassing the password prompt
