###  SEARCH
    #--exact                        # Enable exact-match
    #--no-extended                  # Disable extended-search mode
    --smart-case                    # Smart-case match (default)
    --scheme=default                # Scoring scheme [default|path|history]
    #--nth=N[,..]                   # Comma-separated list of field index expressions for limiting search scope. Each can be a non-zero integer or a range expression ([BEGIN]..[END]).
    #--with-nth=2                   # Transform the presentation of each line using field index expressions
    --accept-nth=1                  # Define which fields to print on accept
    --delimiter='AWK-style'         # Field delimiter regex (default: AWK-style)
    --literal                       # Do not normalize latin script letters
    --tiebreak=begin,pathname,index # Comma-separated list of sort criteria to apply when the scores are tied [length|chunk|pathname|begin|end|index] (default: length)

### INPUT/OUTPUT
    #--read0    # This breaks stuff Read input delimited by ASCII NUL characters
    --print0    # Print output delimited by ASCII NUL characters
    --ansi      # Enable processing of ANSI color codes
    --sync      # Synchronous search for multi-staged filtering

### GLOBAL STYLE
    --style=minimal    # Apply a style preset [default|minimal|full[:BORDER_STYLE]
    --color=base16         # Base scheme (dark|light|base16|bw) and/or custom colors

### DISPLAY MODE
  #--height=[~]HEIGHT[%]           # Display fzf window below the cursor with the given height instead of using fullscreen. A negative value is calculated as the terminal height minus the given value. If prefixed with '~', fzf will determine the height according to the input size.
  #--min-height=HEIGHT[+]          # Minimum height when --height is given as a percentage. Add '+' to automatically increase the value according to the other layout options (default: 10+).
   --tmux=center,50%,border-native # Start fzf in a tmux popup [center|top|bottom|left|right][,SIZE[%]][,SIZE[%]] [,border-native] (default: center,50%)

### LAYOUT
   --layout=reverse       # Choose layout: [default|reverse|reverse-list]
   --margin=0             # Screen margin (TRBL | TB,RL | T,RL,B | T,R,B,L)
   --padding=0            # Padding inside border (TRBL | TB,RL | T,RL,B | T,R,B,L)
   --border=none          # Draw border around the finder [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|line|none] (default: rounded)0
   --border-label=''      # Label to print on the border
   --border-label-pos=1   # Position of the border label [POSITIVE_INTEGER: columns from left| NEGATIVE_INTEGER: columns from right][:bottom] (default: 0 or center)

### LIST SECTION
    --multi=100                 # Enable multi-select with tab/shift-tab
    #--highlight-line           # Highlight the whole current line
    --cycle                     # Enable cyclic scroll
    --wrap                      # Enable line wrap
    --wrap-sign='  '            # Indicator for wrapped lines
    --no-multi-line             # Disable multi-line display of items when using --read0
    #--raw                      # Enable raw mode (show non-matching items)
    #--track                    # Track the current selection when the result is updated
    #--tac                      # Reverse the order of the input
    --gap=1                     # Render empty lines between each item
    --gap-line='-'              # Draw horizontal line on each gap using the string (default: '┈' or '-')
    --freeze-left=1             # Number of fields to freeze on the left
    --freeze-right=1            # Number of fields to freeze on the right
    --keep-right                # Keep the right end of the line visible on overflow
    --scroll-off=2              # Number of screen lines to keep above or below when scrolling to the top or to the bottom (default: 0)
    #--no-hscroll               # Disable horizontal scroll
    --hscroll-off=10            # Number of screen columns to keep to the right of the highlighted substring (default: 10)
    --jump-labels='X'           # Label characters for jump mode
    --gutter='·'                # Character used for the gutter column (default: '▌')
    --gutter-raw='·'            # Character used for the gutter column in raw mode (default: '▖')
    --pointer='>>'              # Pointer to the current line (default: '▌' or '>')
    --marker='▌'                # Multi-select marker (default: '┃' or '>')
    --marker-multi-line='╻┃╹'   # Multi-select marker for multi-line entries; 3 elements for top, middle, and bottom (default: '╻┃╹')
    --ellipsis='··'             # Ellipsis to show when line is truncated (default: '··')
    --tabstop=4                 # Number of spaces for a tab character (default: 8)
    --scrollbar='▌'             # Scrollbar character(s) (each for list section and preview window)
    #--no-scrollbar             # Hide scrollbar
    --list-border=rounded       # Draw border around the list section [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|none] (default: rounded)
    --list-label='List'         # Label to print on the list border
    --list-label-pos=1          # Position of the list label [POSITIVE_INTEGER: columns from left| NEGATIVE_INTEGER: columns from right][:bottom] (default: 0 or center)

### INPUT SECTION
    #--no-input                     # Disable and hide the input section
    --info=default                  # Finder info style [default|right|hidden|inline[-right][:PREFIX]]
    --prompt='> '                   # Input prompt (default: '> ')
    --info-command='echo "$(pwd)"'  # Command to generate info line
    --separator='-'                 # Draw horizontal separator on info line using the string (default: '─' or '-')
    --no-separator                  # Hide info line separator
    --ghost='Enter search term'     # Ghost text to display when the input is empty
    --filepath-word                 # Make word-wise movements respect path separators
    --input-border=rounded          # Draw border around the input section [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|line|none] (default: rounded)
    --input-label='Search'          # Label to print on the input border
    --input-label-pos=1             # Position of the input label [POSITIVE_INTEGER: columns from left| NEGATIVE_INTEGER: columns from right][:bottom] (default: 0 or center)

### PREVIEW WINDOW
    --preview='rg {}'              # Command to preview highlighted line ({})
    --preview-window=right,50%  # Preview window layout (default: right:50%) [up|down|left|right][,SIZE[%]] [,[no]wrap][,[no]cycle][,[no]follow][,[no]info] [,[no]hidden][,border-STYLE] [,+SCROLL[OFFSETS][/DENOM]][,~HEADER_LINES] [,default][,<SIZE_THRESHOLD(ALTERNATIVE_LAYOUT)]
    --preview-border=rounded    # Short for --preview-window=border-STYLE #    [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|line|none] (default: rounded)
    --preview-label='Preview'
    --preview-label-pos=1       # Same as --border-label and --border-label-pos,  but for preview window

### HEADER
    #--header='This is the header'  # String to print as header
    --header-lines=0               # the first N lines of the input are treated as header
    --header-first                 # Print header before the prompt line
    --header-border=rounded        # Draw border around the header section #    [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|line|none] (default: rounded)
    --header-lines-border=none     # Display header from --header-lines with a separate border. Pass 'none' to still separate it but without a border.
    --header-label='Header'        # Label to print on the header border
    --header-label-pos=1           # Position of the header label [POSITIVE_INTEGER: columns from left| NEGATIVE_INTEGER: columns from right][:bottom] (default: 0 or center)

### FOOTER
    --footer='This is the footer'  # String to print as footer
    --footer-border=rounded        # Draw border around the footer section [rounded|sharp|bold|block|thinblock|double|horizontal|vertical| top|bottom|left|right|line|none] (default: line)
    --footer-label='Footer'        # Label to print on the footer border
    --footer-label-pos=1           # Position of the footer label [POSITIVE_INTEGER: columns from left| NEGATIVE_INTEGER: columns from right][:bottom] (default: 0 or center)

