###  DIRECTORY TRAVERSAL (Only used when $FZF_DEFAULT_COMMAND is not set)
    --walker=file,dir,follow,hidden                # [file][,dir][,follow][,hidden] (default: file,follow,hidden)
    --walker-root=.                               # List of directories to walk (default: .)
    --walker-skip=.git,node_modules,.rustup,go/pkg # Comma-separated list of directory names to skip
    --history=/home/TatenK/Documents/logging/fzf.history  # File to store fzf search history (*not* shell command history)
    --history-size=1000                            # Maximum number of entries to keep in the file (default: 1000)

